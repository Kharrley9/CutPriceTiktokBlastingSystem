name: Telegram Bot Runner

on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 09:00 GMT+8 (01:00 UTC)
  workflow_dispatch:
    inputs:
      manual_blast:
        description: 'Trigger manual blast'
        required: false
        default: 'false'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "${{ github.event.inputs.manual_blast }}" = "true" ]; then
            node bot.js --manual-blast
          else
            node bot.js --scheduled
          fi
