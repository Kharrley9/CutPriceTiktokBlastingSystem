<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cut Price Blast System 🎯</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF0050;
            --primary-dark: #cc0040;
            --bg-dark: #0F0F0F;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 0, 80, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 234, 0.05) 0%, transparent 40%);
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .logo-container img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 0, 80, 0.3));
        }

        .system-title {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 1rem;
            background: linear-gradient(to right, #FF0050, #00F2EA);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            color: var(--text-main);
            font-size: 1.5rem;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            text-align: center;
            letter-spacing: 0.1em;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 0, 80, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 0, 80, 0.1);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 0, 80, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ff4b4b;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-container">
            <img src="/assets/logo.png" alt="Logo">
        </div>
        <h1>Admin Login</h1>
        <p>Enter password to access dashboard</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required autofocus>
            </div>
            <button type="submit">LOGIN</button>
            <div id="errorMsg" class="error-msg">❌ Password salah, sila cuba lagi.</div>
        </form>

        <div class="footer-text">Cut Price Blast System © 2026</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const button = e.target.querySelector('button');

            button.disabled = true;
            button.innerText = 'VERIFYING...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/index.html';
                } else {
                    errorMsg.style.display = 'block';
                    button.disabled = false;
                    button.innerText = 'LOGIN';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorMsg.innerText = '❌ Connection error';
                errorMsg.style.display = 'block';
                button.disabled = false;
                button.innerText = 'LOGIN';
            }
        });
    </script>
</body>

</html>
